name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Run bats tests
        run: bats -r tests/
